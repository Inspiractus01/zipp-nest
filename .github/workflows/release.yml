name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build binaries
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TARGETS=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
          )
          mkdir -p dist
          for target in "${TARGETS[@]}"; do
            OS="${target%/*}"
            ARCH="${target#*/}"
            OUT="dist/zipp-nest-${OS}-${ARCH}"
            echo "building $OUT (v${VERSION})"
            GOOS=$OS GOARCH=$ARCH go build \
              -ldflags="-s -w -X main.version=${VERSION}" \
              -o "$OUT" .
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body: |
            ## Install

            **Linux (amd64):**
            ```bash
            curl -sL https://github.com/Inspiractus01/zipp-nest/releases/latest/download/zipp-nest-linux-amd64 -o /usr/local/bin/zipp-nest && chmod +x /usr/local/bin/zipp-nest
            ```

            **macOS (Apple Silicon):**
            ```bash
            curl -sL https://github.com/Inspiractus01/zipp-nest/releases/latest/download/zipp-nest-darwin-arm64 -o /usr/local/bin/zipp-nest && chmod +x /usr/local/bin/zipp-nest
            ```

            Or use the install script:
            ```bash
            curl -sL https://raw.githubusercontent.com/Inspiractus01/zipp-nest/main/install.sh | bash
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
